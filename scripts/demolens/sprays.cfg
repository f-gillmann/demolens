// demolens / sprays.cfg
//
// Records ALL sprays into ONE GOTV demo (gotv_all.dem). GOTV is required: a POV
// `record` demo omits your own fire-bullets (client-predicted), GOTV keeps them,
// and GOTV is the same format as every matchmaking match demo.
//
// PRE-STEP (once, BEFORE the map - GOTV must be enabled before the level loads):
//     tv_enable 1; tv_delay 0;
//     map de_dust2
//     exec demolens/sprays
//
// THEN:
//     press N   -> start the GOTV recording (gotv_all)
//     press J   -> arm AK47 (chat says READY)
//     hold K    -> spray,  release K -> arm next gun (chat says READY)
//     ... hold/release K through all guns ...
//     press M   -> stop the GOTV recording
//
// The last 3 are variants that need a manual action BEFORE you hold K:
//   AUG/SG553 (Scoped) -> hold right-click (scope in) while you spray
//   M4A1-S (No silencer) -> detach the silencer first
//
// verify spread is off:  find nospread  (weapon_accuracy_nospread = 1)

// --- environment, applied immediately on exec ---------------------------------
jointeam 3
sv_cheats 1
god
weapon_accuracy_nospread 1
cl_silencer_mode 1
mp_freezetime 0
mp_roundtime 99999999
mp_roundtime_defuse 99999999
mp_roundtime_hostage 99999999
mp_maxrounds 999
mp_halftime 0
mp_warmup_end
mp_force_pick_time 1
bot_kick
mp_restartgame 1
sv_showimpacts 1

// --- capture loop (no per-gun recording; GOTV records the whole session) -------
// dl_first arms AK (via J). Every release of K runs dl_adv: arm the next gun + READY.
alias dl_first "give weapon_ak47;          alias dl_adv dl_a02;  say [01/19] AK47 READY - shoot"
alias dl_a02   "give weapon_m4a1;          alias dl_adv dl_a03;  say [02/19] M4A4 READY - shoot"
alias dl_a03   "give weapon_m4a1_silencer; alias dl_adv dl_a04;  say [03/19] M4A1-S READY - shoot"
alias dl_a04   "give weapon_aug;           alias dl_adv dl_a05;  say [04/19] AUG READY - shoot"
alias dl_a05   "give weapon_sg556;         alias dl_adv dl_a06;  say [05/19] SG553 READY - shoot"
alias dl_a06   "give weapon_galilar;       alias dl_adv dl_a07;  say [06/19] Galil READY - shoot"
alias dl_a07   "give weapon_famas;         alias dl_adv dl_a08;  say [07/19] FAMAS READY - shoot"
alias dl_a08   "give weapon_mp9;           alias dl_adv dl_a09;  say [08/19] MP9 READY - shoot"
alias dl_a09   "give weapon_mp7;           alias dl_adv dl_a10;  say [09/19] MP7 READY - shoot"
alias dl_a10   "give weapon_mp5sd;         alias dl_adv dl_a11;  say [10/19] MP5-SD READY - shoot"
alias dl_a11   "give weapon_mac10;         alias dl_adv dl_a12;  say [11/19] MAC-10 READY - shoot"
alias dl_a12   "give weapon_ump45;         alias dl_adv dl_a13;  say [12/19] UMP-45 READY - shoot"
alias dl_a13   "give weapon_p90;           alias dl_adv dl_a14;  say [13/19] P90 READY - shoot"
alias dl_a14   "give weapon_bizon;         alias dl_adv dl_a15;  say [14/19] PP-Bizon READY - shoot"
alias dl_a15   "give weapon_negev;         alias dl_adv dl_a16;  say [15/19] Negev READY - shoot"
alias dl_a16   "give weapon_m249;          alias dl_adv dl_a17;  say [16/19] M249 READY - shoot"
alias dl_a17   "give weapon_aug;           alias dl_adv dl_a18;  say [17/19] AUG SCOPED - hold right-click + shoot"
alias dl_a18   "give weapon_sg556;         alias dl_adv dl_a19;  say [18/19] SG553 SCOPED - hold right-click + shoot"
alias dl_a19   "give weapon_m4a1_silencer; alias dl_adv dl_done; say [19/19] M4A1-S NO SILENCER - detach silencer + shoot"
alias dl_done  "say DONE - all 19 in gotv_all, press M to stop recording"

// J = arm AK + start the loop. K = hold to fire; release arms the next gun.
alias dl_adv dl_first
bind j dl_first
alias +dlfire "+attack"
alias -dlfire "-attack; dl_adv"
bind k +dlfire

// N = start the single GOTV recording, M = stop it
bind n "tv_record gotv_all"
bind m "tv_stoprecord"

say demolens ready - press N to record, J to arm AK47, hold/release K through all guns
